name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect sensitive fork changes
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin "${{ github.base_ref }}" --depth=1

          changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          echo "$changed_files"

          if echo "$changed_files" | grep -E '(^\.github/workflows/.*\.ya?ml$|(^|/)(package\.json|bun\.lock|bunfig\.toml)$|^prisma/|^prisma\.config\.ts$|^apps/[^/]+/Dockerfile$|^Dockerfile$)'; then
            echo "::error::Fork PR changed CI/CD, dependency, Prisma, or container files."
            echo "::error::A maintainer must review this and run full CI from a trusted branch."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate --schema prisma/schema.prisma

      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Lint affected projects
        run: bunx nx affected -t lint --parallel=3

      - name: Run unit tests with coverage
        run: bunx nx run-many --target=test --all --parallel=3 --configuration=ci

      - name: Build deployable apps
        run: bunx nx run-many -t build -p backend,frontend --configuration=production --parallel=2

      - name: Collect coverage reports
        id: coverage
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d coverage ]; then
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t reports < <(find coverage -type f \( -name 'lcov.info' -o -name 'coverage-final.json' -o -name 'coverage.xml' -o -name 'clover.xml' \) | sort)

          if [ "${#reports[@]}" -eq 0 ]; then
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          reports_csv="$(IFS=,; echo "${reports[*]}")"
          echo "has_reports=true" >> "$GITHUB_OUTPUT"
          echo "files=$reports_csv" >> "$GITHUB_OUTPUT"

      - name: Upload coverage to Codecov
        if: >
          steps.coverage.outputs.has_reports == 'true' &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: codecov/codecov-action@v6
        with:
          flags: unit
          files: ${{ steps.coverage.outputs.files }}
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Frontend-artifacts
          path: dist/apps/frontend/
          if-no-files-found: error

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Backend-artifacts
          path: dist/apps/backend/
          if-no-files-found: error
