name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate --schema prisma/schema.prisma

      - name: Lint projects
        run: bunx nx run-many -t lint --all --parallel=3

      - name: Run unit tests
        run: bunx nx run-many --target=test --all --parallel=3 --configuration=ci

      - name: Build deployable apps
        run: bunx nx run-many -t build -p backend,frontend --configuration=production --parallel=2
